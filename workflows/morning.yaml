name: morning
description: 多篇新聞金融晨報 Workflow

steps:

  - id: classify_news
    skill: llm
    for_each: input.news_list
    input:
      text: item.content
      filename: item.filename
    collect:
      include_item: true
      result_key: classification
    output:
      result: memory.classified_news
    prompt: templates/morning/classifier.txt
    provider: gemini
    model: gemini-2.5-flash-lite
    fallback_models:
    - gemini-2.5-flash
    - gemini-2.5-pro
    retry: 2
    sleep_seconds: 10
  
  - id: extract_news
    skill: llm
    for_each: memory.classified_news
    input:
      text: item.content
      filename: item.filename
      classification: item.classification
    collect:
      include_item: true
      result_key: extraction
    output:
      result: memory.extracted_news
    prompt: templates/morning/extractor.txt
    provider: gemini
    model: gemini-2.5-flash-lite
    fallback_models:
    - gemini-2.5-flash
    - gemini-2.5-pro
    retry: 2
    sleep_seconds: 10

  - id: write_drafts
    skill: llm
    for_each: memory.extracted_news
    input:
      filename: item.filename
      classification: item.classification
      extract_result: item.extraction
    collect:
      include_item: true
      result_key: draft
    output:
      result: memory.draft_items
    prompt: templates/morning/writer.txt
    provider: gemini
    model: gemini-2.5-flash-lite
    fallback_models:
    - gemini-2.5-flash
    - gemini-2.5-pro
    retry: 2
    sleep_seconds: 10

  - id: format_report
    skill: llm
    input:
      draft_items: memory.draft_items
    output:
      result: output.final_text
    prompt: templates/morning/formatter.txt
    provider: gemini
    model: gemini-2.5-flash-lite
    fallback_models:
    - gemini-2.5-flash
    - gemini-2.5-pro
    retry: 2
    sleep_seconds: 10

  - id: export_docx
    skill: docx
    input:
      text: output.final_text
      output_path: output.docx_path
    output:
      path: output.docx_path
    mode: morning
